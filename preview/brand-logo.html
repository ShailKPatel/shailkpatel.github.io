<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{background:var(--ink-900);padding:30px;min-height:230px;box-sizing:border-box;display:flex;align-items:center;justify-content:space-around}
  .mono-mark{font-family:var(--font-display);font-weight:700;font-size:64px;letter-spacing:-0.04em;color:var(--on-dark-1)}
  .badge{width:96px;height:96px;border-radius:22px;background:#0a0a0a;border:1px solid var(--line-dark-strong);display:flex;align-items:center;justify-content:center}
  .badge img{width:62px;height:62px}
  .em{color:var(--ember-500)}
  .col{display:flex;flex-direction:column;align-items:center;gap:12px}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--on-dark-3);letter-spacing:0.1em;text-transform:uppercase}
</style>
</head>
<body>
<div class="card theme-dark">
  <div class="col"><div class="badge"><img src="../assets/favicon-512.png" alt="SP"></div><span class="n">App icon</span></div>
  <div class="col"><div class="mono-mark">SP</div><span class="n">Serif monogram</span></div>
  <div class="col"><div class="mono-mark">Shail<span class="em">.</span></div><span class="n">Wordmark</span></div>
</div>
</body>
</html>
