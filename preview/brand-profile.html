<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{background:var(--ink-900);padding:30px;min-height:280px;box-sizing:border-box;display:flex;align-items:center;justify-content:space-around}
  .wrap{position:relative;width:180px;height:180px}
  .wrap::before{content:'';position:absolute;inset:-12px;border-radius:50%;border:1px solid var(--line-dark-strong)}
  .wrap img{width:100%;height:100%;border-radius:50%;object-fit:cover;filter:brightness(0.92) contrast(1.05);box-shadow:0 22px 54px rgba(0,0,0,0.6)}
  .ring{position:absolute;inset:-12px;border-radius:50%;border:1.5px solid var(--ember-500);clip-path:polygon(50% 0,100% 0,100% 45%,50% 45%)}
  .info{max-width:240px}
  .n{font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--on-dark-3);margin-bottom:10px}
  .t{font-family:var(--font-sans);font-size:13px;font-weight:300;color:var(--on-dark-2);line-height:1.6}
</style>
</head>
<body>
<div class="card theme-dark">
  <div class="wrap"><img src="../assets/profile-pic.png" alt="Shail"><span class="ring"></span></div>
  <div class="info">
    <div class="n">Portrait treatment</div>
    <div class="t">Circular crop, subtly dimmed (brightness 0.92, contrast 1.05), hairline outer ring with a single ember arc accent. Deep editorial drop-shadow.</div>
  </div>
</div>
</body>
</html>
