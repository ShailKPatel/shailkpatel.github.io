<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{background:var(--bone-50);padding:30px 34px;min-height:200px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center}
  .lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--on-light-3);margin-bottom:18px}
  .row{display:flex;gap:14px}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px}
  .chip{height:78px;border-radius:10px;border:1px solid var(--line-light)}
  .name{font-family:var(--font-mono);font-size:11px;color:var(--on-light-1)}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--on-light-3)}
</style>
</head>
<body>
<div class="card theme-light">
  <div class="lbl">Bone — warm light canvas & surfaces</div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#f4f1ea"></div><span class="name">bone-50</span><span class="hex">#f4f1ea</span></div>
    <div class="sw"><div class="chip" style="background:#ffffff"></div><span class="name">white</span><span class="hex">#ffffff</span></div>
    <div class="sw"><div class="chip" style="background:#ece7db"></div><span class="name">bone-100</span><span class="hex">#ece7db</span></div>
    <div class="sw"><div class="chip" style="background:#ddd6c6"></div><span class="name">bone-200</span><span class="hex">#ddd6c6</span></div>
  </div>
</div>
</body>
</html>
