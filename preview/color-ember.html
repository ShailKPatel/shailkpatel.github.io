<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{background:var(--ink-900);padding:30px 34px;min-height:240px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center}
  .lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--on-dark-3);margin-bottom:6px}
  .sub{font-family:var(--font-sans);font-size:13px;font-weight:300;color:var(--on-dark-2);margin-bottom:20px;max-width:46ch}
  .row{display:flex;gap:14px}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px}
  .chip{height:74px;border-radius:10px}
  .name{font-family:var(--font-mono);font-size:11px;color:var(--on-dark-1)}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--on-dark-3)}
</style>
</head>
<body>
<div class="card theme-dark">
  <div class="lbl">Ember — the one signature accent</div>
  <div class="sub">Used sparingly: links, dates, key words, the primary CTA. Never as a fill across large areas.</div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#ff6c3c"></div><span class="name">ember-400</span><span class="hex">#ff6c3c</span></div>
    <div class="sw"><div class="chip" style="background:#f2531b;box-shadow:var(--shadow-ember)"></div><span class="name">ember-500</span><span class="hex">#f2531b</span></div>
    <div class="sw"><div class="chip" style="background:#d8410d"></div><span class="name">ember-600</span><span class="hex">#d8410d</span></div>
    <div class="sw"><div class="chip" style="background:var(--ember-glow);border:1px solid var(--line-dark)"></div><span class="name">glow 16%</span><span class="hex">rgba</span></div>
  </div>
</div>
</body>
</html>
