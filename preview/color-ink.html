<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{background:var(--ink-900);padding:30px 34px;min-height:200px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center}
  .lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--on-dark-3);margin-bottom:18px}
  .row{display:flex;gap:14px}
  .sw{flex:1;display:flex;flex-direction:column;gap:8px}
  .chip{height:78px;border-radius:10px;border:1px solid var(--line-dark)}
  .name{font-family:var(--font-mono);font-size:11px;color:var(--on-dark-1)}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--on-dark-3)}
</style>
</head>
<body>
<div class="card theme-dark">
  <div class="lbl">Ink — dark canvas & surfaces</div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#0a0a0a"></div><span class="name">ink-900</span><span class="hex">#0a0a0a</span></div>
    <div class="sw"><div class="chip" style="background:#161616"></div><span class="name">ink-800</span><span class="hex">#161616</span></div>
    <div class="sw"><div class="chip" style="background:#1e1e1e"></div><span class="name">ink-700</span><span class="hex">#1e1e1e</span></div>
    <div class="sw"><div class="chip" style="background:#2a2a2a"></div><span class="name">ink-600</span><span class="hex">#2a2a2a</span></div>
  </div>
</div>
</body>
</html>
