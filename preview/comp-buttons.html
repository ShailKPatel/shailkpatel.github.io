<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{background:var(--ink-900);padding:34px 40px;min-height:210px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:22px}
  .lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--on-dark-3)}
  .row{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
  .btn{font-family:var(--font-sans);font-weight:500;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;padding:14px 30px;border-radius:100px;cursor:pointer;border:1px solid transparent;display:inline-flex;align-items:center;gap:8px}
  .primary{background:var(--ember-500);color:#fff;box-shadow:var(--shadow-ember)}
  .secondary{background:transparent;color:var(--on-dark-1);border-color:var(--line-dark-strong)}
  .ghost{background:transparent;color:var(--on-dark-2);padding:14px 12px}
  .light-btn{background:#ece9e2;color:#0a0a0a}
</style>
</head>
<body>
<div class="card theme-dark">
  <div class="lbl">Buttons</div>
  <div class="row">
    <button class="btn primary">Connect <span style="font-family:var(--font-mono)">↗</span></button>
    <button class="btn secondary">Resume</button>
    <button class="btn light-btn">View Work</button>
    <button class="btn ghost">Skip →</button>
  </div>
  <div class="row" style="opacity:0.55">
    <button class="btn primary">Hover lifts + glows</button>
    <button class="btn secondary">Press shrinks 0.97</button>
  </div>
</div>
</body>
</html>
