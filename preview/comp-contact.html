<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{background:var(--ink-900);padding:30px 40px;min-height:240px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center}
  .rows{display:flex;flex-direction:column;border-top:1px solid var(--line-dark)}
  .row{display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid var(--line-dark)}
  .label{font-family:var(--font-sans);font-weight:600;font-size:18px;color:var(--on-dark-1)}
  .desc{font-family:var(--font-mono);font-size:11px;color:var(--on-dark-2);margin-top:3px}
  .arrow{font-size:20px;color:var(--on-dark-3)}
  .row:nth-child(2) .arrow{color:var(--ember-500)}
</style>
</head>
<body>
<div class="card theme-dark">
  <div class="rows">
    <div class="row"><div><div class="label">Email Me</div><div class="desc">shailpatel.connect@gmail.com</div></div><span class="arrow">↗</span></div>
    <div class="row"><div><div class="label" style="color:#fff">LinkedIn</div><div class="desc">shailkpatel</div></div><span class="arrow">↗</span></div>
    <div class="row"><div><div class="label">GitHub</div><div class="desc">shailkpatel</div></div><span class="arrow">↗</span></div>
  </div>
</div>
</body>
</html>
