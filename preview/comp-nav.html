<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .stage{background:var(--ink-900);min-height:150px;display:flex;align-items:center;background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:48px 48px}
  .nav{width:100%;display:flex;align-items:center;justify-content:space-between;padding:18px 36px;background:rgba(10,10,10,0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--line-dark)}
  .brand{font-family:var(--font-display);font-weight:700;font-size:22px;color:var(--on-dark-1);letter-spacing:-0.03em}
  .links{display:flex;gap:28px}
  .link{font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--on-dark-2)}
  .link.active{color:var(--ember-500)}
  .toggle{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,0.08);border:1px solid var(--line-dark-strong);position:relative}
  .toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#d0d0d0}
</style>
</head>
<body>
<div class="stage theme-dark">
  <nav class="nav">
    <span class="brand">SP</span>
    <div class="links">
      <span class="link active">Home</span><span class="link">Work</span><span class="link">Publications</span><span class="link">Skills</span><span class="link">Contact</span>
    </div>
    <div class="toggle"></div>
  </nav>
</div>
</body>
</html>
