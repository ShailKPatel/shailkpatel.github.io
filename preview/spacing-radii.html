<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{background:var(--ink-900);padding:30px 34px;min-height:190px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center}
  .lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--on-dark-3);margin-bottom:20px}
  .row{display:flex;gap:18px;align-items:flex-end}
  .item{display:flex;flex-direction:column;gap:9px;align-items:center}
  .box{width:74px;height:60px;background:var(--ink-700);border:1px solid var(--line-dark-strong)}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--on-dark-2)}
</style>
</head>
<body>
<div class="card theme-dark">
  <div class="lbl">Corner Radii</div>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:4px"></div><span class="n">xs · 4</span></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><span class="n">sm · 8</span></div>
    <div class="item"><div class="box" style="border-radius:14px"></div><span class="n">md · 14</span></div>
    <div class="item"><div class="box" style="border-radius:22px"></div><span class="n">lg · 22</span></div>
    <div class="item"><div class="box" style="border-radius:100px;width:96px"></div><span class="n">pill</span></div>
  </div>
</div>
</body>
</html>
