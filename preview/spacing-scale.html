<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{background:var(--ink-900);padding:30px 34px;min-height:210px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:10px}
  .lbl{font-family:var(--font-mono);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--on-dark-3);margin-bottom:8px}
  .row{display:flex;align-items:center;gap:14px}
  .bar{height:14px;background:var(--ember-500);border-radius:2px;opacity:0.85}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--on-dark-2);width:80px}
</style>
</head>
<body>
<div class="card theme-dark">
  <div class="lbl">Spacing — 4px base scale</div>
  <div class="row"><span class="n">2 · 8px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="n">4 · 16px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="n">5 · 24px</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="n">6 · 32px</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="n">7 · 48px</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="n">8 · 64px</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="n">9 · 96px</span><div class="bar" style="width:96px"></div></div>
</div>
</body>
</html>
