<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{background:var(--ink-900);padding:38px 44px;min-height:332px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
  .meta{display:flex;justify-content:space-between;align-items:baseline;font-family:var(--font-mono);font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase;color:var(--on-dark-3);padding-bottom:18px;border-bottom:1px solid var(--line-dark);margin-bottom:24px}
  .name{font-family:var(--font-display);color:var(--on-dark-1);line-height:0.9;letter-spacing:-0.035em;font-size:74px;font-weight:400}
  .name em{font-style:italic;font-weight:500}
  .ladder{display:flex;align-items:baseline;gap:26px;margin-top:26px;flex-wrap:wrap}
  .w{display:flex;flex-direction:column;gap:6px}
  .w .g{font-family:var(--font-display);color:var(--on-dark-1);font-size:34px;line-height:1}
  .w .l{font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--on-dark-3)}
</style>
</head>
<body>
<div class="card theme-dark">
  <div class="meta"><span>Playfair Display</span><span>Display Serif · The voice</span></div>
  <div class="name">Shail K <em>Patel</em></div>
  <div class="ladder">
    <div class="w"><span class="g" style="font-weight:400">Aa</span><span class="l">Regular 400</span></div>
    <div class="w"><span class="g" style="font-weight:500">Aa</span><span class="l">Medium 500</span></div>
    <div class="w"><span class="g" style="font-weight:700">Aa</span><span class="l">Bold 700</span></div>
    <div class="w"><span class="g" style="font-style:italic;font-weight:500">Aa</span><span class="l">Italic</span></div>
  </div>
</div>
</body>
</html>
