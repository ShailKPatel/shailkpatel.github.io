<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  .card{background:var(--ink-900);padding:34px 40px;min-height:240px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center;gap:22px}
  .lbl{font-family:var(--font-mono);font-weight:500;font-size:13px;letter-spacing:0.18em;text-transform:uppercase;color:var(--on-dark-3)}
  .mono{font-family:var(--font-mono);font-size:14px;color:var(--on-dark-2);letter-spacing:0.02em}
  .em{color:var(--ember-500)}
</style>
</head>
<body>
<div class="card theme-dark">
  <div class="lbl">— Eyebrow Label · DM&nbsp;Mono</div>
  <div class="mono">predictgrad.streamlit.app &nbsp;·&nbsp; <span class="em">Nov 2025 — present</span></div>
  <div class="mono">doi.org/10.5281/zenodo.19686376</div>
  <div class="mono" style="color:var(--on-dark-3)">// monospace carries every technical detail: dates, URLs, DOIs, code</div>
</div>
</body>
</html>
